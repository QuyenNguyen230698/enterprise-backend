<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation Accepted</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f0fdf4; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #ffffff; border: 1px solid #bbf7d0; border-radius: 16px; padding: 40px 36px; max-width: 440px; width: 100%; box-shadow: 0 4px 24px rgba(16,185,129,0.10); text-align: center; }
        .icon { width: 64px; height: 64px; background: #dcfce7; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 28px; }
        .title { font-size: 22px; font-weight: 800; color: #14532d; margin-bottom: 8px; letter-spacing: -0.5px; }
        .subtitle { font-size: 14px; color: #166534; font-weight: 600; margin-bottom: 20px; }
        .divider { border: none; border-top: 1px solid #d1fae5; margin: 20px 0; }
        .meeting-info { background: #f0fdf4; border-radius: 10px; padding: 16px 20px; text-align: left; margin-bottom: 24px; }
        .meeting-info p { font-size: 13px; color: #166534; margin-bottom: 6px; display: flex; gap: 8px; }
        .meeting-info p:last-child { margin-bottom: 0; }
        .meeting-info .label { font-weight: 700; color: #14532d; min-width: 80px; }
        .badge { display: inline-flex; align-items: center; gap: 6px; background: #dcfce7; color: #166534; font-size: 12px; font-weight: 800; padding: 6px 14px; border-radius: 999px; border: 1px solid #86efac; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 0.05em; }
        .footer { font-size: 12px; color: #86efac; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✓</div>
        <div class="title">You're confirmed!</div>
        <div class="subtitle">Your attendance has been recorded.</div>

        <div class="badge">✓ Accepted</div>

        <div class="meeting-info">
            <p><span class="label">Meeting</span><span>{{ topic }}</span></p>
            <p><span class="label">Date</span><span>{{ date }}</span></p>
            <p><span class="label">Time</span><span>{{ start_time }} – {{ end_time }}</span></p>
            <p><span class="label">Room</span><span>{{ room }}</span></p>
        </div>

        <hr class="divider">
        <p class="footer">This is an automated message from ENTERPRISEMEETING. You may close this window.</p>
    </div>
</body>
</html>
