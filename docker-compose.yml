services:
  redis:
    image: redis:7-alpine
    container_name: meeting_redis
    command: redis-server --requirepass Quyen20262027 --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - meeting_net

  node-app:
    build: ./node-gateway
    volumes:
      - ./node-gateway/src:/app/src
    environment:
      - REDIS_URL=${REDIS_URL}
      - PYTHON_SERVICE_URL=${PYTHON_SERVICE_URL}
      - PORT=${PORT}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - redis
      - python-app
    ports:
      - "8000:8000"
    networks:
      - meeting_net

  python-app:
    build: ./python-service
    volumes:
      - ./python-service/uploads:/app/uploads
    environment:
      - POSTGRES_SERVER=${POSTGRES_SERVER}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - ZOOM_ACCOUNT_ID=${ZOOM_ACCOUNT_ID}
      - ZOOM_CLIENT_ID=${ZOOM_CLIENT_ID}
      - ZOOM_CLIENT_SECRET=${ZOOM_CLIENT_SECRET}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - BASE_URL=${BASE_URL}
    depends_on:
      - db
    networks:
      - meeting_net

  # worker service chạy local (enterprise-redis), không deploy lên VPS
  # worker:
  #   build: ../enterprise-redis
  #   container_name: meeting_worker
  #   environment:
  #     - PORT=2222
  #     - BACKEND_URL=http://python-app:8000
  #     - REDIS_HOST=redis
  #     - REDIS_PORT=6379
  #     - REDIS_PASSWORD=Quyen20262027
  #     - POSTGRES_SERVER=db
  #     - POSTGRES_PORT=5432
  #     - POSTGRES_USER=${POSTGRES_USER}
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
  #     - POSTGRES_DB=${POSTGRES_DB}
  #     - BULL_BOARD_PASSWORD=${POSTGRES_PASSWORD}
  #   depends_on:
  #     - redis
  #     - db
  #   ports:
  #     - "2222:2222"
  #   networks:
  #     - meeting_net

  db:
    image: postgres:15-alpine
    container_name: meeting_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - meeting_net

networks:
  meeting_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
